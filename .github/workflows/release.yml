name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Compile TypeScript + bundle renderer (separate from electron-builder
      # so we can pass platform flags directly to electron-builder below)
      - name: Compile
        run: npm run build:compile

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Package Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never
        env:
          # Optional: base64-encoded .pfx file and its password.
          # Leave unset to build an unsigned installer.
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Package macOS
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          # Optional: base64-encoded Developer ID Application .p12 and password.
          # Leave unset to build an unsigned / unnotarized DMG.
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # When CSC_LINK is empty, prevent electron-builder from scanning the
          # local keychain (which would fail on CI runners).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Notarization credentials (only used when CSC_LINK is set).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
